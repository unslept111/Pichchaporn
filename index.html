<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pichchaporn Love</title>
<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let angle = 0;
let text = "pichchaporn ";

function drawHeartText(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(angle);

    ctx.fillStyle = "red";
    ctx.font = "20px Arial";
    ctx.shadowColor = "red";
    ctx.shadowBlur = 10;

    for(let t = 0; t < Math.PI * 2; t += 0.05){

        let x = 16 * Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t) - 5*Math.cos(2*t)
                -2*Math.cos(3*t) - Math.cos(4*t));

        x *= 20;
        y *= 20;

        ctx.save();
        ctx.translate(x,y);
        ctx.rotate(Math.atan2(y,x));
        ctx.fillText(text,0,0);
        ctx.restore();
    }

    ctx.restore();

    angle += 0.01;
    requestAnimationFrame(drawHeartText);
}

drawHeartText();
</script>

</body>
</html>
