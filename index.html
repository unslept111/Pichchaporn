<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Animation</title>

<style>
body{
    background:#e9e9e9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* กล่องพื้นหลังแบบในรูป */
.board{
    background:#f5f5f5;
    padding:20px 40px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* ตัวอักษร LED */
#text{
    font-family: monospace;
    font-size:50px;
    letter-spacing:8px;
    color:red;
    text-shadow:
        0 0 5px red,
        0 0 10px red,
        0 0 20px red;
}
</style>
</head>
<body>

<div class="board">
    <div id="text"></div>
</div>

<script>
const message = "LOVE YOU PICHHAPORN";
const speed = 150; // ความเร็วการพิมพ์ (ยิ่งน้อยยิ่งเร็ว)
let i = 0;

function typeWriter(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

typeWriter();
</script>

</body>
</html>
