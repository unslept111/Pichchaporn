<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pichchaporn Love</title>
<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let baseText = " pichchaporn ";
let offset = 0;

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);

    ctx.fillStyle = "red";
    ctx.font = "22px Arial";
    ctx.shadowColor = "red";
    ctx.shadowBlur = 15;

    let repeatedText = baseText.repeat(50);

    let index = 0;

    for(let t = 0; t < Math.PI * 2; t += 0.03){

        let x = 16 * Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t) - 5*Math.cos(2*t)
                -2*Math.cos(3*t) - Math.cos(4*t));

        x *= 22;
        y *= 22;

        let char = repeatedText[(index + offset) % repeatedText.length];

        ctx.save();
        ctx.translate(x,y);

        // หมุนตัวอักษรให้เรียงตามเส้นหัวใจ
        let dx = 16 * 3 * Math.pow(Math.sin(t),2) * Math.cos(t);
        let dy = 13*Math.sin(t)
                -10*Math.sin(2*t)
                -6*Math.sin(3*t)
                -4*Math.sin(4*t);

        ctx.rotate(Math.atan2(dy,dx));

        ctx.fillText(char,0,0);
        ctx.restore();

        index++;
    }

    ctx.restore();

    offset += 1; // ทำให้ตัวหนังสือวิ่ง
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
