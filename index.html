<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love You Pichchaporn</title>
<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family: monospace;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const phrase = "love you pichchaporn";
let points = [];
let time = 0;

// สร้างจุดหัวใจ (กำหนดระยะห่างให้ไม่ซ้อน)
for(let t = 0; t < Math.PI * 2; t += 0.32){
    const x = 16 * Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t)
            - 5*Math.cos(2*t)
            - 2*Math.cos(3*t)
            - Math.cos(4*t);
    points.push({x,y,offset:Math.random()*2});
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#ff4da6";
    ctx.font="18px monospace";
    ctx.shadowColor="#ff4da6";
    ctx.shadowBlur=12;

    // หัวใจลอยขึ้นลงทั้งก้อน
    const floatY = Math.sin(time)*20;

    points.forEach((p,index)=>{

        // wave เล็ก ๆ ให้แต่ละจุดไม่แข็ง
        const wave = Math.sin(time*2 + p.offset)*5;

        const x = canvas.width/2 + p.x*18;
        const y = canvas.height/2 - p.y*18 + floatY + wave;

        ctx.fillText(phrase, x, y);
    });

    time += 0.03;
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
