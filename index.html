<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pichchaporn Heart</title>
<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let text = "  pichchaporn  ";
let flow = 0;

function heart(t, scale){
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t)
            -5*Math.cos(2*t)
            -2*Math.cos(3*t)
            -Math.cos(4*t));
    return {x:x*scale, y:y*scale};
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);

    ctx.fillStyle = "#ff1a1a";
    ctx.font = "22px Arial";
    ctx.shadowColor = "#ff0000";
    ctx.shadowBlur = 15;

    let repeatedText = text.repeat(200);

    // ทำหลายเส้นเหมือนในภาพ
    for(let layer = 0; layer < 5; layer++){

        let scale = 18 + layer*3;
        let index = flow;

        for(let t = 0; t < Math.PI*2; t += 0.015){

            let p = heart(t, scale);

            ctx.save();
            ctx.translate(p.x, p.y);

            // คำนวณแนวเส้นโค้ง
            let next = heart(t+0.01, scale);
            let angle = Math.atan2(next.y - p.y, next.x - p.x);
            ctx.rotate(angle);

            ctx.fillText(
                repeatedText.substring(index, index + text.length),
                0,
                0
            );

            ctx.restore();

            index += text.length;
        }
    }

    ctx.restore();

    flow += 1; // ความเร็วไหล
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
