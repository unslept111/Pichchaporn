<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love You Pichchaporn</title>
<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family: monospace;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const text = "love you pichchaporn ";
let time = 0;

function heart(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t)
              - 5 * Math.cos(2 * t)
              - 2 * Math.cos(3 * t)
              - Math.cos(4 * t);
    return { x, y };
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff4da6";
    ctx.font = "18px monospace";

    let i = 0;

    for (let t = 0; t < Math.PI * 2; t += 0.18) {

        const pos = heart(t);

        // ทำให้หัวใจขยับเบา ๆ ซ้าย-ขวา และขึ้นลงนิด ๆ
        const floatX = Math.sin(time) * 20;
        const floatY = Math.cos(time * 0.8) * 10;

        const x = canvas.width / 2 + pos.x * 20 + floatX;
        const y = canvas.height / 2 - pos.y * 20 + floatY;

        ctx.fillText(text[i % text.length], x, y);
        i++;
    }

    time += 0.03;
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
